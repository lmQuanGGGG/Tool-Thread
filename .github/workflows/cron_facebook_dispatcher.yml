name: 🕒 Auto Facebook (Reels/Post) Dispatcher

on:
  schedule:
    # Chạy lệch giờ cao điểm GitHub Actions. Các mốc UTC này tương ứng
    # 08h, 10h, 11h, 13h, 14h, 15h, 16h, 19h, 20h, 21h, 22h, 23h giờ Việt Nam.
    - cron: '17 1,3,4,6,7,8,9,12,13,14,15,16 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd "Tool-Thread"/tele_bot
          npm install @supabase/supabase-js axios dotenv

      - name: Run Dispatcher
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          cd "Tool-Thread"/tele_bot
          node cron_facebook_dispatcher.js
