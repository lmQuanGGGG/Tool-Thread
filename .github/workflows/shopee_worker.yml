name: FB Shopee Post Story Bot

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'Email khách hàng (dashboard tự truyền)'
        required: false
        default: 'lmquang.devops@gmail.com'
      run_mode:
        description: 'Nguồn kích hoạt: auto hoặc manual'
        required: false
        default: 'manual'

permissions:
  contents: write

# Dùng cùng lock với Reels để tránh hai job ghi đè cookie Facebook của nhau.
concurrency:
  group: fb-publish-session-${{ github.event.inputs.email }}
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install DB deps
        run: npm install @supabase/supabase-js dotenv
      - name: Lấy danh sách Khách hàng từ Supabase
        id: set-matrix
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AUTO_BOT_KEY: fb_post
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo 'matrix=["${{ github.event.inputs.email }}"]' >> $GITHUB_OUTPUT
          else
            USERS=$(cd "Tool-Thread"/tele_bot && node get_users.js | grep -o '\[.*\]' | tail -n 1)
            echo "matrix=$USERS" >> $GITHUB_OUTPUT
          fi

  run-shopee-bot:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        email: ${{ fromJson(needs.setup.outputs.matrix) }}
      max-parallel: 20
      fail-fast: false
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'

    - name: Install Dependencies
      run: |
        cd "Tool-Thread"/tele_bot && npm install && npm install puppeteer-extra puppeteer-extra-plugin-stealth

    - name: Khóa Facebook session của tài khoản
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: cd "Tool-Thread"/tele_bot && node fb_session_lock.js acquire "${{ matrix.email }}" "${{ github.run_id }}-${{ github.job }}"

    - name: Run FB Shopee Post Story Bot with Xvfb
      env:
        USER_EMAIL: ${{ matrix.email }}
        RUN_MODE: ${{ github.event.inputs.run_mode || 'manual' }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        FB_COOKIE: ${{ secrets.FB_COOKIE }} # Fallback nếu Supabase không có cookie
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
      run: |
        echo "🔥 Đang chạy Shopee Post cho khách hàng: ${{ matrix.email }}"
        # Xvfb giả lập màn hình để lách thuật toán Headless của FB
        cd "Tool-Thread"/tele_bot && xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" node fb_bot/4_fb_shopee_post_story.js

    - name: Nhả khóa Facebook session
      if: always()
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: cd "Tool-Thread"/tele_bot && node fb_session_lock.js release "${{ matrix.email }}" "${{ github.run_id }}-${{ github.job }}"
