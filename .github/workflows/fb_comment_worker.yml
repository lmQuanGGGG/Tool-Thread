name: Facebook Auto Comment Bot

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'Email khách hàng'
        required: false
        default: 'admin@autofarm.com'

permissions:
  contents: read

jobs:
  run-fb-comment-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'

    - name: Install Dependencies
      run: |
        cd "Tool-Thread/tele_bot" && npm install && npm install puppeteer-extra puppeteer-extra-plugin-stealth @supabase/supabase-js

    - name: Khóa Facebook session của tài khoản
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: cd "Tool-Thread"/tele_bot && node fb_session_lock.js acquire "${{ github.event.inputs.email }}" "${{ github.run_id }}-${{ github.job }}"

    - name: Run FB Comment Bot with Xvfb
      env:
        USER_EMAIL: ${{ github.event.inputs.email }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        FB_COOKIE: ${{ secrets.FB_COOKIE }}
        TELE_BOT_TOKEN: ${{ secrets.TELE_BOT_TOKEN }}
      run: |
        # Chạy bot rải link vào Facebook Reels (không dùng file test_fb_cmt.js).
        cd "Tool-Thread/tele_bot"
        xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" node fb_bot/6_fb_comment_strangers.js

    - name: Nhả khóa Facebook session
      if: always()
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: cd "Tool-Thread"/tele_bot && node fb_session_lock.js release "${{ github.event.inputs.email }}" "${{ github.run_id }}-${{ github.job }}"

    - name: Upload debug screenshots when failed
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: fb-cmt-reels-debug
        path: Tool-Thread/tele_bot/fb_bot/debug_*.png
        if-no-files-found: ignore
